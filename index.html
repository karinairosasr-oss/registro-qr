<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validando Registro...</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: linear-gradient(135deg, #ffec3d 0%, #ffc107 100%); 
            text-align: center; 
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            max-width: 400px; 
            width: 90%;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-hb { 
            max-width: 160px; 
            height: auto; 
            margin-bottom: 1.5rem; 
        }
        .logo-onroad { 
            max-width: 180px; 
            height: auto; 
            margin-top: 2rem; 
        }
        
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #ffc107; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
        .code-box { 
            background: #fff9db; 
            border: 2px dashed #ffc107; 
            padding: 15px; 
            border-radius: 12px; 
            margin: 15px 0; 
            font-weight: bold; 
            font-size: 1.5rem;
            color: #e67e22;
        }

        /* Estilo del botón de WhatsApp */
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s;
        }
        .btn-whatsapp:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="HBLOGO.jpeg" alt="HB Hoteles" class="logo-hb">
        
        <div id="loading-area">
            <div class="loader"></div>
            <h1>Procesando...</h1>
            <p id="status">Por favor, acepta el permiso de ubicación para generar tu descuento.</p>
        </div>

        <div id="success-area" class="hidden">
            <h1 style="color: #333;">¡Listo!</h1>
            <p style="font-size: 0.95rem; color: #555;">Toma captura de este código para tu <b>10% de descuento</b> (Válido 10 de mayo en buffet).</p>
            
            <div id="id-unico" class="code-box">---</div>

            <!-- Botón de WhatsApp Dinámico -->
            <a id="wa-btn" href="#" target="_blank" class="btn-whatsapp">
                Reservar por WhatsApp
            </a>
            
            <p style="font-size: 0.8rem; color: #777; margin-top: 20px;">Ubicación: <br><span id="direccion-text" style="font-weight: bold;">---</span></p>
            <p style="color: #27ae60; font-weight: bold;">¡Gracias!</p>
        </div>

        <img src="ROAD NEGRO (1).png" alt="OnRoad Analytics" class="logo-onroad">
    </div>

    <script>
        const GEOAPIFY_KEY = "73282b6f42214899a14ad7ad5421244d"; 
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwmO2mnhsQE0cuoMi_dF4OlcrAgJyHycN5D-CTDIC0GmK77YkOPWdRsqYxyXiOeJiT4ww/exec";
        const WA_BASE_URL = "https://wa.me/message/BGAE7LDJPHMSF1?src=qr";

        function generarID() {
            return 'QR-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        }

        function procesar() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    try {
                        const geoRes = await fetch(`https://api.geoapify.com/v1/geocode/reverse?lat=${lat}&lon=${lon}&apiKey=${GEOAPIFY_KEY}`);
                        const geoData = await geoRes.json();
                        const direccion = geoData.features[0].properties.formatted;
                        const idUnico = generarID();

                        // Enviar datos a Google Sheets
                        await fetch(WEB_APP_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ idUnico, lat, lon, direccion })
                        });

                        // Configurar Mensaje de WhatsApp
                        const mensajeWA = encodeURIComponent(`Hola vi tu publicidad en Onroad y me interesa asistir al evento para celebrar a mamá y conseguir un 10% de descuento con mi codigo: ${idUnico}`);
                        // Nota: Usamos el link directo que pasaste y le concatenamos el texto
                        const finalWaLink = `https://wa.me/5212711234567?text=${mensajeWA}`; // Reemplaza con el número real si el link de mensaje no acepta texto directo, o usa:
                        const linkAlterno = `https://api.whatsapp.com/send?phone=522717124299&text=${mensajeWA}`; // Ejemplo con el número del hotel

                        // Mostrar interfaz
                        document.getElementById('loading-area').classList.add('hidden');
                        document.getElementById('success-area').classList.remove('hidden');
                        document.getElementById('id-unico').innerText = idUnico;
                        document.getElementById('direccion-text').innerText = direccion;
                        
                        // Asignar el link al botón (Usando el número directo para asegurar que el mensaje se pegue)
                        document.getElementById('wa-btn').href = `https://api.whatsapp.com/send?text=${mensajeWA}`;

                    } catch (e) {
                        document.getElementById('status').innerText = "Error de conexión.";
                    }
                }, () => {
                    document.getElementById('status').innerHTML = "<span style='color:red;'>⚠️ Activa el GPS para el descuento.</span>";
                });
            }
        }
        window.onload = procesar;
    </script>
</body>
</html>
