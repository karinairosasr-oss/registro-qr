<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descuento OnRoad</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: linear-gradient(135deg, #ffec3d 0%, #ffc107 100%); 
            text-align: center; 
        }
        .card { 
            background: white; 
            padding: 2rem; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            max-width: 380px; 
            width: 90%;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-hb { max-width: 140px; height: auto; margin-bottom: 1.5rem; }
        .logo-onroad { max-width: 170px; height: auto; margin-top: 1.5rem; }
        
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #ffc107; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
        .code-box { 
            background: #fff9db; 
            border: 2px dashed #ffc107; 
            padding: 12px; 
            border-radius: 12px; 
            margin: 15px 0; 
            font-weight: bold; 
            font-size: 1.4rem;
            color: #e67e22;
        }
        .btn-whatsapp {
            background-color: #25d366;
            color: white !important;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            display: block;
            width: 80%;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Logo HB de imagen_21.png -->
        <img src="HBLOGO.jpeg" alt="HB Hoteles" class="logo-hb">
        
        <div id="loading-area">
            <div class="loader"></div>
            <h1>Procesando...</h1>
            <p id="status">Por favor, acepta la ubicación para generar tu descuento.</p>
        </div>

        <div id="success-area" class="hidden">
            <h1 style="color: #333; margin: 0;">¡Listo!</h1>
            <p style="font-size: 0.9rem; color: #555;">Toma captura de este código para tu <b>10% de descuento</b>.</p>
            <div id="id-unico" class="code-box">---</div>

            <a id="wa-btn" href="#" target="_blank" class="btn-whatsapp">
                RESERVAR POR WHATSAPP
            </a>
            
            <p style="font-size: 0.75rem; color: #777; margin-top: 15px;">Ubicación: <br><span id="direccion-text" style="font-weight: bold;">---</span></p>
        </div>

        <!-- Logo OnRoad Negro de imagen_21.png -->
        <img src="ROAD NEGRO (1).png" alt="OnRoad Analytics" class="logo-onroad">
    </div>

    <script>
        const GEOAPIFY_KEY = "73282b6f42214899a14ad7ad5421244d"; 
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwmO2mnhsQE0cuoMi_dF4OlcrAgJyHycN5D-CTDIC0GmK77YkOPWdRsqYxyXiOeJiT4ww/exec";
        const PHONE = "522711409758";

        // Ahora todos los códigos empiezan con HBM
        function generarID() {
            return 'HBM-' + Math.random().toString(36).substr(2, 6).toUpperCase();
        }

        function procesar() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    try {
                        const geoRes = await fetch(`https://api.geoapify.com/v1/geocode/reverse?lat=${lat}&lon=${lon}&apiKey=${GEOAPIFY_KEY}`);
                        const geoData = await geoRes.json();
                        const direccion = geoData.features[0].properties.formatted;
                        const idUnico = generarID();

                        await fetch(WEB_APP_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ idUnico, lat, lon, direccion })
                        });

                        // Mensaje personalizado con prefijo HBM
                        const texto = `Hola vi tu publicidad en Onroad y me interesa asistir al evento para celebrar a mamá y conseguir un 10% de descuento con mi codigo: ${idUnico}`;
                        const finalLink = `https://api.whatsapp.com/send?phone=${PHONE}&text=${encodeURIComponent(texto)}`;

                        document.getElementById('loading-area').classList.add('hidden');
                        document.getElementById('success-area').classList.remove('hidden');
                        document.getElementById('id-unico').innerText = idUnico;
                        document.getElementById('direccion-text').innerText = direccion;
                        document.getElementById('wa-btn').href = finalLink;

                    } catch (e) {
                        document.getElementById('status').innerText = "Error de conexión.";
                    }
                }, () => {
                    document.getElementById('status').innerHTML = "<span style='color:red;'>⚠️ Activa el GPS.</span>";
                });
            }
        }
        window.onload = procesar;
    </script>
</body>
</html>
